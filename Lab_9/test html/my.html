<!DOCTYPE html>
<html>
<head>
    <title>НЕМ-Нение</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("{{ url_for('static', filename='photo.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            padding-top: 150px;
        }
        .container1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
      
            min-height: 140px;
            padding: 10px 20px;
            background-color: rgb(248, 215, 215);
            color: #352f2f;
            z-index: 1000;
            box-sizing: border-box;
            
        
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
        }


        .header-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-bottom: 2px solid #352f2f;
            padding-bottom: 10px;
        }

        .page-title {
            margin: 0;
            font-size: 36px;
            font-weight: bold;
            font-family: Georgia, serif;
            color: #352f2f;
            letter-spacing: 3px;
        }

        .page-slogan {
            margin: 5px 0 0 0;
            font-size: 18px;
            font-style: italic;
            color: #555;
        }

        .header-contacts {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .text-block {
            flex: 0 0 auto;
            text-align: center;
        }

        .text-block h2 {
            margin: 0;
            font-size: 20px;
            color: #352f2f;
        }

        .text-block p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #352f2f;
        }

        .container2 {
            max-width: 1400px;
            margin-top: 140px;
            min-height: calc(100vh - 140px);
            margin: 0px auto;
            padding: 40px;
            background-color: rgba(0, 0, 0, 0.95);
            color: #fff;
            border: 2px solid #f9d0d0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container1">
        <div class="header-title">
            <h1 class="page-title">НЕМ-Нение</h1>
            <p class="page-slogan">Лучшый отзыв - это молчание</p>
        </div>

     
        <div class="header-contacts">
            <div class="text-block">
                <h2>НЕ ЗВОНИТЕ НАМ</h2>
                <p>8 800 555-35-35</p>
            </div>
            
            <div class="text-block">
                <h2>Email / Почта</h2>
                <p>Только почтой России</p>
            </div>
            
            <div class="text-block">
                <h2>Адрес</h2>
                <p>г. Санкт-Петербург, Кронверский 49</p>
            </div>
            
            <div class="text-block">
                <h2>Режим работы</h2>
                <p>Вс 2:00-9:00</p>
            </div>
        </div>
    </div>

    <div class="container2">
        <h1>Основной блок</h1>
        <p></p>
        <p>Текст 1...</p>
        <p>Текст 2...</p>
        <p>Текст 3...</p>
        <p>Текст 4...</p>
        <p>Текст 5...</p>
    </div>

</body>
</html>
